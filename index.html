<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roadmap TAXit! - Amiba</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --purple-dark:#4A1A6B;--purple-med:#6B2D8B;--purple-light:#8E4DAF;--purple-soft:#B87FD8;
  --blue-accent:#3A7BD5;--blue-light:#5B9EE1;--bg:#F8F6FB;--card:#FFF;
  --green:#2E7D32;--green-bg:#E8F5E9;--green-bar:#4CAF50;
  --orange:#E65100;--orange-bg:#FFF3E0;--orange-bar:#FF9800;
  --red:#C62828;--red-bg:#FFEBEE;
  --gray:#6B7280;--gray-l:#E5E7EB;
  --sh:0 2px 12px rgba(74,26,107,.08);--sh2:0 6px 24px rgba(74,26,107,.14);--r:14px;
  --f2:#6B2D8B;--f3:#3A7BD5;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:#1F2937}

/* HEADER */
.hd{background:linear-gradient(135deg,var(--purple-dark),var(--purple-med) 50%,var(--blue-accent));padding:32px 28px 48px;color:#fff;position:relative;overflow:hidden}
.hd::before{content:'';position:absolute;top:-60%;right:-15%;width:500px;height:500px;background:radial-gradient(circle,rgba(255,255,255,.06),transparent 70%);border-radius:50%}
.hd-c{max-width:1100px;margin:0 auto;position:relative;z-index:1}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.logo img{height:36px;filter:brightness(0) invert(1)}
.logo span{font-size:22px;font-weight:700;letter-spacing:1px}
.hd h1{font-size:30px;font-weight:700;margin-bottom:5px;letter-spacing:-.5px}
.hd p{font-size:14px;opacity:.85;margin-bottom:20px}
.hd-m{display:flex;gap:16px;flex-wrap:wrap}
.mi{font-size:12px;opacity:.9;background:rgba(255,255,255,.1);padding:5px 12px;border-radius:18px}

.ct{max-width:1100px;margin:-28px auto 40px;padding:0 20px;position:relative;z-index:2}

/* LOADING */
.loading{text-align:center;padding:60px;color:var(--purple-med);font-size:16px}
.loading .spin{display:inline-block;width:28px;height:28px;border:3px solid var(--gray-l);border-top-color:var(--purple-med);border-radius:50%;animation:sp .7s linear infinite;margin-bottom:12px}
@keyframes sp{to{transform:rotate(360deg)}}

/* OVERALL */
.ov{background:var(--card);border-radius:var(--r);padding:22px 26px;box-shadow:var(--sh);margin-bottom:22px;border:1px solid rgba(74,26,107,.06)}
.ov-t{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--gray);margin-bottom:10px;font-weight:600}
.ov-bc{background:var(--gray-l);border-radius:10px;height:16px;overflow:hidden;margin-bottom:10px}
.ov-b{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--purple-dark),var(--purple-med),var(--blue-accent));width:0%;transition:width 1.5s cubic-bezier(.4,0,.2,1)}
.ov-s{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--gray)}
.sd{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:4px}

/* PHASE GROUP */
.pg{margin-bottom:24px}
.pg-t{font-size:15px;font-weight:700;color:var(--purple-dark);margin-bottom:12px;display:flex;align-items:center;gap:8px;padding-left:4px}
.ptag{padding:3px 10px;border-radius:16px;font-size:10px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.8px}
.ptag.f2{background:var(--f2)}.ptag.f3{background:var(--f3)}

/* CARD */
.pc{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;transition:box-shadow .3s;border:1px solid rgba(74,26,107,.06);margin-bottom:8px}
.pc:hover{box-shadow:var(--sh2)}
.ph{padding:16px 22px;cursor:pointer;user-select:none;display:flex;align-items:center;gap:12px;transition:background .2s}
.ph:hover{background:rgba(74,26,107,.02)}
.pn{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0}
.pn.f2{background:var(--f2)}.pn.f3{background:var(--f3)}
.pi{flex:1;min-width:0}.pi-n{font-weight:600;font-size:13px;margin-bottom:2px}.pi-s{font-size:11px;color:var(--gray)}
.pp{display:flex;align-items:center;gap:10px;flex-shrink:0}
.pb-m{width:100px;height:6px;background:var(--gray-l);border-radius:3px;overflow:hidden}
.pb-f{height:100%;border-radius:3px;width:0%;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.pb-f.f2{background:var(--f2)}.pb-f.f3{background:var(--f3)}
.ppct{font-weight:700;font-size:12px;width:38px;text-align:right}
.ppct.f2{color:var(--f2)}.ppct.f3{color:var(--f3)}
.badge{padding:3px 9px;border-radius:16px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
.badge.done{background:var(--green-bg);color:var(--green)}.badge.progress{background:#F3ECFA;color:var(--purple-med)}.badge.pending{background:var(--orange-bg);color:var(--orange)}
.chv{width:16px;height:16px;flex-shrink:0;transition:transform .3s;color:var(--gray)}
.pc.open .chv{transform:rotate(180deg)}
.pb-body{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1)}
.pc.open .pb-body{max-height:400px}
.pb-ct{padding:0 22px 18px;border-top:1px solid var(--gray-l)}
.tl{padding-top:12px}
.ti{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.04)}
.ti:last-child{border-bottom:none}
.tc{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;margin-top:1px}
.tc.done{background:var(--green-bg);color:var(--green)}.tc.progress{background:#F3ECFA;color:var(--purple-med)}.tc.pending{background:var(--orange-bg);color:var(--orange)}
.tt{flex:1}.tt-n{font-weight:600;font-size:11px;margin-bottom:1px}.tt-d{font-size:10px;color:var(--gray);line-height:1.5}

/* GANTT */
.gs{margin-top:28px}
.st{font-size:17px;font-weight:700;color:var(--purple-dark);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.gc{background:var(--card);border-radius:var(--r);padding:22px;box-shadow:var(--sh);border:1px solid rgba(74,26,107,.06);overflow-x:auto}
.gt{width:100%;border-collapse:collapse;min-width:650px}
.gt th{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--gray);padding:5px 3px 8px;border-bottom:2px solid var(--gray-l);font-weight:600;text-align:center}
.gt th:first-child{text-align:left;width:170px;padding-left:6px}
.gt td{padding:3px 1px;position:relative;height:34px;vertical-align:middle;border-left:1px solid rgba(0,0,0,.03)}
.gt td:first-child{font-size:10px;font-weight:600;color:#374151;padding-left:6px;white-space:nowrap;border-left:none}
.gt tr{border-bottom:1px solid rgba(0,0,0,.03)}
.gb{height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;color:#fff;position:absolute;top:50%;transform:translateY(-50%);left:2px;right:2px;width:calc(100% - 4px);transition:transform .2s,box-shadow .2s;z-index:1}
.gb:hover{box-shadow:0 3px 10px rgba(0,0,0,.2);transform:translateY(-50%) scaleY(1.2)}
.gb.f2{background:linear-gradient(90deg,#6B2D8B,#3A7BD5)}.gb.f3{background:linear-gradient(90deg,#3A7BD5,#5B9EE1)}
.gpr td{padding:7px 3px 3px;border-bottom:none!important}
.gpl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:5px}
.gpd{width:7px;height:7px;border-radius:50%}
.leg{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap}
.leg-i{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--gray)}
.leg-d{width:12px;height:7px;border-radius:3px}
.leg-d.f2{background:var(--f2)}.leg-d.f3{background:var(--f3)}

.ft{margin-top:28px;text-align:center;font-size:10px;color:var(--gray);padding:14px;border-top:1px solid var(--gray-l)}
@media(max-width:768px){.hd h1{font-size:22px}.ct{padding:0 12px}.ph{padding:12px;flex-wrap:wrap}.pb-m{width:60px}}
</style>
</head>
<body>

<div class="hd">
  <div class="hd-c">
    <div class="logo">
      <svg width="34" height="34" viewBox="0 0 100 100" fill="none">
        <path d="M50 10C50 10 72 28 66 52C60 76 38 82 30 72C22 62 28 44 44 36C60 28 50 10 50 10Z" fill="url(#a)" opacity=".9"/>
        <path d="M35 20C35 20 22 40 32 58C42 76 60 72 62 60C64 48 50 40 38 45C26 50 35 20 35 20Z" fill="url(#b)" opacity=".7"/>
        <circle cx="48" cy="38" r="5" fill="#fff" opacity=".35"/>
        <defs><linearGradient id="a" x1="30" y1="10" x2="55" y2="80"><stop stop-color="#B87FD8"/><stop offset="1" stop-color="#3A7BD5"/></linearGradient>
        <linearGradient id="b" x1="25" y1="20" x2="60" y2="70"><stop stop-color="#6B2D8B"/><stop offset="1" stop-color="#5B9EE1"/></linearGradient></defs>
      </svg>
      <span>amiba</span>
    </div>
    <h1>Roadmap Proyecto TAXit!</h1>
    <p>Seguimiento de implementaci&oacute;n &mdash; Actualizado din&aacute;micamente desde Google Sheets</p>
    <div class="hd-m">
      <div class="mi">&#9989; Fase 1: Completada</div>
      <div class="mi">&#128640; Fase 2: En curso</div>
      <div class="mi">&#128197; Fase 3: Planificaci&oacute;n</div>
    </div>
  </div>
</div>

<div class="ct">
  <div id="app">
    <div class="loading"><div class="spin"></div><br>Cargando datos desde Google Sheets...</div>
  </div>
</div>

<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTabwM_i1M1kkAa1LrxynPS9IGE1OOl_mj0vtnhaUzdw-G4fjGH55AOfP2ISixz2w/pub?gid=2087250348&single=true&output=csv';

const months = ['May','Jun','Jul','Ago','Sep','Oct'];
const icons = {done:'\u2713',progress:'\u25B6',pending:'\u25CB','en desarrollo':'\u25B6',completado:'\u2713'};

function parseLine(line) {
  const vals = [];
  let current = '', inQuotes = false;
  for (let ch of line) {
    if (ch === '"') { inQuotes = !inQuotes; }
    else if (ch === ',' && !inQuotes) { vals.push(current.trim()); current = ''; }
    else { current += ch; }
  }
  vals.push(current.trim());
  return vals;
}

function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  // Find the header row - look for row containing "Tarea"
  let headerIdx = 0;
  for (let i = 0; i < lines.length; i++) {
    if (lines[i].toLowerCase().includes('tarea') && lines[i].toLowerCase().includes('fase')) {
      headerIdx = i;
      break;
    }
  }
  const headers = parseLine(lines[headerIdx]).map(h => h.replace(/"/g,''));
  return lines.slice(headerIdx + 1).map(line => {
    const vals = parseLine(line);
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || '').replace(/"/g,''));
    return obj;
  });
}

function statusClass(estado) {
  const s = estado.toLowerCase();
  if (s.includes('completado')) return 'done';
  if (s.includes('desarrollo')) return 'progress';
  return 'pending';
}

function badgeLabel(estado) {
  const s = estado.toLowerCase();
  if (s.includes('completado')) return 'Completado';
  if (s.includes('desarrollo')) return 'En desarrollo';
  return 'Pendiente';
}

function render(data) {
  const app = document.getElementById('app');
  
  // Group by fase
  const fases = {};
  data.forEach(row => {
    const fase = row.Fase || 'Sin fase';
    if (!fases[fase]) fases[fase] = [];
    fases[fase].push(row);
  });
  
  // Overall
  const totalPct = data.reduce((a, r) => a + (parseInt(r.Porcentaje) || 0), 0);
  const avgPct = Math.round(totalPct / data.length);
  const completed = data.filter(r => statusClass(r.Estado) === 'done').length;
  const inProgress = data.filter(r => statusClass(r.Estado) === 'progress').length;
  const pending = data.filter(r => statusClass(r.Estado) === 'pending').length;
  
  let html = `
    <div class="ov">
      <div class="ov-t">Progreso General Post-Lanzamiento</div>
      <div class="ov-bc"><div class="ov-b" id="ob"></div></div>
      <div class="ov-s">
        <span><span class="sd" style="background:var(--green-bar)"></span> ${completed} completados</span>
        <span><span class="sd" style="background:var(--f2)"></span> ${inProgress} en desarrollo</span>
        <span><span class="sd" style="background:var(--orange-bar)"></span> ${pending} pendientes</span>
        <span style="margin-left:auto;font-weight:700;color:var(--purple-dark)" id="op">${avgPct}%</span>
      </div>
    </div>`;
  
  // Phase groups
  Object.entries(fases).forEach(([fase, items]) => {
    const faseClass = fase.includes('2') ? 'f2' : 'f3';
    const faseLabel = fase.toUpperCase();
    html += `<div class="pg"><div class="pg-t"><span class="ptag ${faseClass}">${faseLabel}</span>${fase} \u2014 ${fase.includes('2') ? 'Prioridades Inmediatas' : 'Automatizaci\u00f3n de Cartera'}</div>`;
    
    items.forEach(row => {
      const pct = parseInt(row.Porcentaje) || 0;
      const sc = statusClass(row.Estado);
      const bl = badgeLabel(row.Estado);
      const prio = row.Prioridad || '';
      
      html += `
        <div class="pc" onclick="this.classList.toggle('open')">
          <div class="ph">
            <div class="pn ${faseClass}">${prio}</div>
            <div class="pi"><div class="pi-n">${row.Tarea}</div><div class="pi-s">${row.Subtitulo || ''}</div></div>
            <div class="pp">
              <div class="pb-m"><div class="pb-f ${faseClass}" data-w="${pct}"></div></div>
              <div class="ppct ${faseClass}">${pct}%</div>
            </div>
            <div class="badge ${sc}">${bl}</div>
            <svg class="chv" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"/></svg>
          </div>
          <div class="pb-body"><div class="pb-ct"><div class="tl">
            <div class="ti">
              <div class="tc ${sc}">${icons[sc] || '\u25CB'}</div>
              <div class="tt">
                <div class="tt-n">${row.Tarea}</div>
                <div class="tt-d">${row.Subtitulo || ''}</div>
              </div>
            </div>
          </div></div></div>
        </div>`;
    });
    html += '</div>';
  });
  
  // GANTT
  const totalWeeks = 24;
  html += `<div class="gs"><div class="st">&#128202; Cronograma Gantt</div><div class="gc"><table class="gt"><thead><tr><th>Tarea</th>`;
  for (let w = 0; w < totalWeeks; w++) {
    const mIdx = Math.floor(w / 4);
    const isFirst = w % 4 === 0;
    html += `<th>${isFirst && months[mIdx] ? months[mIdx] : ''}</th>`;
  }
  html += '</tr></thead><tbody>';
  
  // Group gantt by fase
  Object.entries(fases).forEach(([fase, items]) => {
    const faseClass = fase.includes('2') ? 'f2' : 'f3';
    html += `<tr class="gpr"><td colspan="${totalWeeks+1}"><div class="gpl"><div class="gpd" style="background:var(--${faseClass})"></div>${fase.toUpperCase()}</div></td></tr>`;
    
    items.forEach(row => {
      const start = parseInt(row.Semana_Inicio) - 1 || 0;
      const end = parseInt(row.Semana_Fin) || start + 1;
      const span = end - start;
      
      html += '<tr>';
      html += `<td>${row.Tarea}</td>`;
      for (let w = 0; w < totalWeeks; w++) {
        if (w === start) {
          html += `<td colspan="${span}" style="position:relative"><div class="gb ${faseClass}">${span > 2 ? span + ' sem' : ''}</div></td>`;
          w += span - 1;
        } else {
          html += '<td></td>';
        }
      }
      html += '</tr>';
    });
  });
  
  html += `</tbody></table>
    <div class="leg">
      <div class="leg-i"><div class="leg-d f2"></div> Fase 2 (en desarrollo)</div>
      <div class="leg-i"><div class="leg-d f3"></div> Fase 3 (planificaci\u00f3n)</div>
    </div></div></div>`;
  
  html += `<div class="ft">Documento generado por el equipo de Amiba \u2014 \u00c1rea de Implementaci\u00f3n | Proyecto TAXit!<br>Los datos se actualizan desde Google Sheets al recargar la p\u00e1gina</div>`;
  
  app.innerHTML = html;
  
  // Animate
  setTimeout(() => {
    const ob = document.getElementById('ob');
    if (ob) ob.style.width = avgPct + '%';
    document.querySelectorAll('.pb-f').forEach(b => b.style.width = (b.dataset.w || 0) + '%');
  }, 300);
}

// Fetch data
fetch(SHEET_URL)
  .then(r => r.text())
  .then(csv => {
    const data = parseCSV(csv);
    // Filter out empty rows and header-like rows
    const filtered = data.filter(r => r.Tarea && r.Tarea !== 'Tarea' && !r.Tarea.includes('ROADMAP'));
    render(filtered);
  })
  .catch(err => {
    document.getElementById('app').innerHTML = `
      <div class="ov" style="text-align:center;color:var(--red)">
        <p style="font-size:14px;font-weight:600;margin-bottom:8px">No se pudo cargar el Google Sheet</p>
        <p style="font-size:12px;color:var(--gray)">Verific\u00e1 que el sheet est\u00e9 publicado en la web como CSV.<br>Error: ${err.message}</p>
      </div>`;
  });
</script>

</body>
</html>
